<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Готическая рулетка</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="roulette-container">
        <button class="gothic-button" id="spinBtn">КРУТИТЬ</button>
        
        <div class="wheel-wrapper">
            <canvas id="rouletteWheel" width="600" height="600"></canvas>
            <div class="arrow-pointer"></div>
        </div>
        
        <div class="result-scroll" id="result">
            <p class="metal-text" id="resultText">🖤</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
