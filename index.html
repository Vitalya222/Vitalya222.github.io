<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Готическая рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0b2e 0%, #0a0515 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
        }
        .roulette-container {
            text-align: center;
            padding: 20px;
        }
        .wheel-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 20px auto;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(184, 134, 11, 0.5);
        }
        .arrow-pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #c0c0c0;
            filter: drop-shadow(0 0 10px #b8860b);
            z-index: 10;
        }
        button {
            background: linear-gradient(145deg, #2d1b3a, #0a0515);
            border: 2px solid #c0c0c0;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            margin: 20px auto;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #b8860b;
            border-color: #b8860b;
        }
        .result {
            background: rgba(10, 5, 20, 0.8);
            backdrop-filter: blur(5px);
            border: 2px solid #c0c0c0;
            border-radius: 20px;
            padding: 15px 30px;
            margin: 20px auto;
            display: inline-block;
            font-size: 24px;
            font-family: 'Playfair Display', serif;
            color: #f0f0f0;
            min-width: 280px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="roulette-container">
        <button id="spinBtn">КРУТИТЬ</button>
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="arrow-pointer"></div>
        </div>
        <div class="result" id="result">🖤</div>
    </div>

    <script>
        const SEGMENTS = [
            { name: 'РОЗА', value: 10, color: '#4a1d2d' },
            { name: 'ЧЕРЕП', value: 25, color: '#2d1b3a' },
            { name: 'МЫШЬ', value: 50, color: '#1a3a3a' },
            { name: 'КИНЖАЛ', value: 100, color: '#3a1a2a' },
            { name: 'СВЕЧА', value: 5, color: '#b8a9c9' },
            { name: 'РОЗА', value: 200, color: '#c0a080' },
            { name: 'ШАР', value: 150, color: '#ff006e' },
            { name: 'ГРОБ', value: 500, color: '#6a0dad' }
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');

        let currentAngle = 0;
        let isSpinning = false;

        function drawWheel(angle) {
            const w = canvas.width;
            const h = canvas.height;
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) / 2 - 10;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            ctx.clearRect(0, 0, w, h);
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const start = i * angleStep + angle;
                const end = (i + 1) * angleStep + angle;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.closePath();
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.fill();
                ctx.strokeStyle = '#c0c0c0';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(start + angleStep / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 14px 'Playfair Display'";
                ctx.shadowBlur = 3;
                ctx.shadowColor = "black";
                ctx.fillText(SEGMENTS[i].name, radius * 0.65, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#1a0b2e';
            ctx.fill();
            ctx.strokeStyle = '#c0c0c0';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function getWinnerIndex(angle) {
            const pointerAngle = Math.PI / 2;
            let raw = pointerAngle - angle;
            raw = ((raw % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            return Math.floor((raw / (2 * Math.PI)) * SEGMENTS.length);
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            resultDiv.textContent = '🔄 КРУТИТСЯ...';
            
            const fullRotations = 12 + Math.random() * 8;
            const randomStop = Math.random() * Math.PI * 2;
            const targetDelta = fullRotations * 2 * Math.PI + randomStop;
            const targetAngle = currentAngle + targetDelta;
            
            const startTime = performance.now();
            const duration = 5000;
            
            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3.5);
                currentAngle = currentAngle + (targetAngle - currentAngle) * ease;
                drawWheel(currentAngle);
                
                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = targetAngle % (Math.PI * 2);
                    drawWheel(currentAngle);
                    
                    const idx = getWinnerIndex(currentAngle);
                    const prize = SEGMENTS[idx];
                    resultDiv.textContent = `${prize.name} | ${prize.value} 💀`;
                    isSpinning = false;
                }
            }
            
            requestAnimationFrame(animate);
        }

        drawWheel(0);
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
